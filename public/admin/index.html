<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>AK Panel — İçerik yönetimi</title>
    <link rel="stylesheet" href="/admin/ak-panel.css" />
    <link rel="stylesheet" href="/admin/decap-overrides.css" />
    <!--
      UYARI: Kullanıcı adı / şifre bu dosyada düz metindir; kaynakta görülebilir.
      Kamuya açık sitede güvenli değildir. Netlify’da Identity + Git Gateway kullanın.
    -->
  </head>
  <body>
    <div id="ak-gate">
      <div class="ak-card">
        <div class="ak-brand">
          <div class="ak-logo">AK</div>
          <div>
            <h1>AK Panel</h1>
            <p class="ak-sub">Hidrofor — içerik yönetimi</p>
          </div>
        </div>
        <form id="ak-form" novalidate>
          <label for="ak-user">Kullanıcı adı</label>
          <input id="ak-user" name="user" type="text" autocomplete="username" required />
          <label for="ak-pass">Şifre</label>
          <input id="ak-pass" name="pass" type="password" autocomplete="current-password" required />
          <button type="submit">Giriş yap</button>
          <p id="ak-err" aria-live="polite"></p>
        </form>
        <p class="ak-hint">
          Yerelde içerik kaydetmek için ayrı terminalde <code>npm run cms</code> çalıştırın.
          <br /><br />
          <strong>Test girişi:</strong> kullanıcı adı <code>admin</code> — şifre <code>admin1233</code>
          (rakamlar: bir, iki, üç, <em>üç</em> — toplam 4 rakam)
        </p>
      </div>
    </div>

    <div id="ak-cms-wrap" class="ak-hidden">
      <div class="ak-toolbar">
        <span><strong>AK</strong> PANEL</span>
        <button type="button" id="ak-logout">Çıkış</button>
      </div>
      <div id="nc-root"></div>
    </div>

    <script>
      (function () {
        var STORAGE_KEY = "ak_panel_ok";
        var USER = "admin";
        var PASS = "admin1233";
        var gate = document.getElementById("ak-gate");
        var wrap = document.getElementById("ak-cms-wrap");
        var form = document.getElementById("ak-form");
        var err = document.getElementById("ak-err");
        var logoutBtn = document.getElementById("ak-logout");

        function showCms() {
          gate.classList.add("ak-hidden");
          wrap.classList.remove("ak-hidden");
          if (window.__decapLoaded) return;
          window.__decapLoaded = true;
          var s = document.createElement("script");
          s.src = "https://unpkg.com/decap-cms@3.4.0/dist/decap-cms.js";
          document.body.appendChild(s);
        }

        if (sessionStorage.getItem(STORAGE_KEY) === "1") {
          showCms();
        }

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          err.textContent = "";
          var u = (document.getElementById("ak-user").value || "").trim().toLowerCase();
          var p = (document.getElementById("ak-pass").value || "").trim();
          if (!u) {
            err.textContent = "Kullanıcı adını girin.";
            return;
          }
          if (!p) {
            err.textContent = "Şifreyi girin.";
            return;
          }
          if (u !== USER || p !== PASS) {
            err.textContent = "Kullanıcı adı veya şifre hatalı.";
            return;
          }
          sessionStorage.setItem(STORAGE_KEY, "1");
          showCms();
        });

        logoutBtn.addEventListener("click", function () {
          sessionStorage.removeItem(STORAGE_KEY);
          location.reload();
        });
      })();
    </script>
  </body>
</html>
